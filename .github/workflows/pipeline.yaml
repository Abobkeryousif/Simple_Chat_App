# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on:  ubuntu-latest

    steps:
      - name:  checkout code
        uses:  actions/checkout@v3

      - name:  set repo name to lowercase
        run:  |
          REPO=$(echo "${{github.repository}}" | tr '[:upper:]' '[:lower:]')
          echo "REPO=$REPO" >> $GITHUB_ENV

      - name:  login to github container registery
        uses:  docker/login-action@v2 
        with:
          registry:  ghcr.io
          username:  ${{github.repository_owner }}
          password:  ${{secrets.CR_PAT }}

      - name:  build and push docker image
        uses:  docker/build-push-action@v4
        with:
          context:  .
          push:  true
          tags:  |
            ghcr.io/${{ env.REPO }}:latest
            ghcr.io/${{ env.REPO }}:${{ github.sha }}

      - name:  update argocd repo
        env:
          GIT_TOKEN:  ${{ secrets.GITOPS_PAT }}
          REPO:  ${{ env.REPO }}

        run:  |
          git config --global user.name "Github Actions"
          git config --global user.email "actions@github.com"

          git clone https://${GIT_TOKEN}@github.com/Abobkeryousif/chat-app-gitops.git gitops
          cd gitops

          sed -i "s|image: .*|image: ghcr.io/${REPO}:${{ github.sha }}|g" deployment.yaml  

          git add deployment.yaml
          git commit -m "update app docker image to ${{ github.sha }}" || echo "no changes"
          git push

